<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concetti Generali di Cittadinanza Digitale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230E6E70'/%3E%3Cpath d='M32 12l16 6v12c0 11-7 18-16 22-9-4-16-11-16-22V18z' fill='none' stroke='%23E6F3F2' stroke-width='4' stroke-linejoin='round'/%3E%3Cpath d='M24 32l6 6 12-13' fill='none' stroke='%231FA6B8' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<style>
:root{
  /* Palette dedicata "Digital Trust" — teal/petrolio + ciano */
  --bg:#EAF3F3; --warm:#DCEBEA; --card:#FFFFFF; --card2:#F4FAFA;
  --brand:#0E6E70; --brand2:#13898B; --brandD:#063F40; --brandL:rgba(14,110,112,.08);
  --accent:#1497AD; --accent2:#1FA6B8; --accentL:rgba(20,151,173,.10);
  --gold:#B8860B; --gold2:#D4A017; --goldL:rgba(184,134,11,.12);
  --text:#10302F; --muted:#456564; --light:#7CA3A2;
  --ok:#0E7C5A; --okL:rgba(14,124,90,.10);
  --warn:#B8860B; --warnL:rgba(184,134,11,.12);
  --brd:#C3DAD9; --brd2:#A2C4C3;
  --shadow:0 2px 14px rgba(14,110,112,.08); --shadow2:0 8px 28px rgba(6,63,64,.14);
  --body:'Atkinson Hyperlegible',Helvetica,Arial,sans-serif;
  --head:'Lexend',sans-serif;
  --maxw:1440px; --side:260px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--body);font-size:18px;line-height:1.6;color:var(--text);
  background:linear-gradient(160deg,var(--bg),var(--warm));min-height:100vh}
h1,h2,h3,h4{font-family:var(--head);line-height:1.25;font-weight:600}
button{font-family:var(--body);cursor:pointer;border:none;background:none;color:inherit}
.silent{font-size:.92em;color:var(--muted)}

/* ===== Layout shell ===== */
.shell{display:grid;grid-template-columns:var(--side) 1fr;min-height:100vh;max-width:var(--maxw);margin:0 auto}
.sidebar{background:var(--brandD);color:#E6F3F2;padding:22px 16px;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding:0 4px}
.brand .logo{flex:0 0 auto}
.brand .txt b{font-family:var(--head);font-weight:700;font-size:1.02rem;display:block;color:#fff;line-height:1.2}
.brand .txt span{font-size:.78rem;color:#9FCBC9}
.navlbl{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:#6FA9A7;margin:14px 4px 4px;font-family:var(--head)}
.navbtn{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:11px 12px;border-radius:11px;color:#CFE6E5;font-size:.96rem;transition:.16s;min-height:48px}
.navbtn:hover{background:rgba(255,255,255,.07);color:#fff}
.navbtn.active{background:var(--brand2);color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.18)}
.navbtn .ico{flex:0 0 22px;display:flex}
.navbtn .nm{flex:1;line-height:1.2}
.navbtn .stat{flex:0 0 auto}
.navbtn.final{margin-top:auto;background:rgba(184,134,11,.16);color:#F1D89A;border:1px solid rgba(212,160,23,.45)}
.navbtn.final.active{background:var(--gold);color:#241a00;border-color:var(--gold2)}
.navbtn.final.locked{opacity:.55;cursor:not-allowed}
.navbtn.final.ready{background:rgba(184,134,11,.28);color:#FBE9B8;animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(212,160,23,.0)}50%{box-shadow:0 0 0 4px rgba(212,160,23,.22)}}
.progwrap{margin:14px 4px 4px;font-size:.78rem;color:#9FCBC9}
.progbar{height:7px;border-radius:6px;background:rgba(255,255,255,.12);overflow:hidden;margin-top:6px}
.progbar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));width:0;transition:width .5s}
.credit{margin-top:auto;padding-top:16px;border-top:1px solid rgba(255,255,255,.12);display:flex;align-items:center;gap:11px}
.credit img{width:42px;height:42px;border-radius:9px;background:#fff;padding:3px;flex:0 0 auto;object-fit:contain}
.credit .ct{font-size:.72rem;line-height:1.3;color:#BFE0DE}
.credit .ct b{display:block;color:#fff;font-family:var(--head);font-weight:600;font-size:.78rem}
.readchk{margin-top:14px;display:flex;align-items:flex-start;gap:11px;background:var(--brandL);border:1px solid var(--brand2);border-radius:10px;padding:12px 14px;cursor:pointer;user-select:none}
.readchk input{position:absolute;opacity:0;width:0;height:0}
.readchk .box{flex:0 0 auto;width:24px;height:24px;border:2px solid var(--brand2);border-radius:7px;background:#fff;display:flex;align-items:center;justify-content:center;transition:.15s;margin-top:1px}
.readchk .box svg{width:16px;height:16px;opacity:0;transform:scale(.5);transition:.15s;color:#fff}
.readchk input:checked + .box{background:var(--ok);border-color:var(--ok)}
.readchk input:checked + .box svg{opacity:1;transform:scale(1)}
.readchk .rt{font-size:.95rem;color:var(--text);font-weight:600}
.readchk input:focus-visible + .box{outline:3px solid var(--accent);outline-offset:2px}
.kw{font-weight:700;color:var(--brandD)}

/* ===== Main ===== */
.main{padding:30px 36px 60px;min-width:0}
.page{display:none;animation:fade .3s ease}
.page.show{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.phead{margin-bottom:20px}
.phead .kick{font-family:var(--head);font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;color:var(--brand2);font-weight:600}
.phead h1{font-size:1.9rem;color:var(--brandD);margin-top:3px}
.phead h2{font-size:1.6rem;color:var(--brandD);margin-top:3px}
.phead p{color:var(--muted);margin-top:6px;max-width:70ch}

/* Home */
.hero{background:var(--card);border:1px solid var(--brd);border-radius:20px;padding:34px;box-shadow:var(--shadow);margin-bottom:24px}
.hero h1{font-size:2.2rem;color:var(--brandD);max-width:18ch}
.hero p{margin-top:12px;color:var(--muted);max-width:62ch}
.hero .badges{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:8px;background:var(--brandL);color:var(--brand);padding:7px 13px;border-radius:30px;font-size:.86rem;font-weight:700;font-family:var(--head)}
.cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
.scard{background:var(--card);border:1px solid var(--brd);border-radius:16px;padding:20px;box-shadow:var(--shadow);transition:.18s;text-align:left;display:flex;flex-direction:column;gap:8px}
.scard:hover{transform:translateY(-3px);box-shadow:var(--shadow2);border-color:var(--brand2)}
.scard .ic{width:46px;height:46px;border-radius:12px;background:var(--brandL);display:flex;align-items:center;justify-content:center;color:var(--brand)}
.scard h3{font-size:1.12rem;color:var(--brandD)}
.scard .meta{font-size:.84rem;color:var(--muted)}
.scard .done{color:var(--ok);font-weight:700;font-size:.82rem;display:flex;align-items:center;gap:5px}

/* ===== Gallery / video ===== */
.gallery{display:grid;grid-template-columns:1.15fr 1fr;gap:26px;align-items:start}
.vcol{position:sticky;top:24px}
.player{position:relative;width:100%;aspect-ratio:16/9;background:#04282a;border-radius:16px;overflow:hidden;box-shadow:var(--shadow2)}
.player iframe{position:absolute;inset:0;width:100%;height:100%;border:0;pointer-events:none}
.player .pv-over{position:absolute;inset:0;cursor:pointer;background:transparent}
.player .pv-cover{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#063f40,#0E6E70);color:#fff;text-align:center;padding:20px;z-index:3}
.player .pv-cover .pbtn{width:74px;height:74px;border-radius:50%;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);border:2px solid rgba(255,255,255,.5)}
.player .pv-ctrl{position:absolute;left:0;right:0;bottom:0;z-index:4;display:flex;align-items:center;gap:10px;padding:9px 12px;background:linear-gradient(transparent,rgba(4,40,42,.85));opacity:0;transition:.2s}
.player:hover .pv-ctrl,.player.playing .pv-ctrl{opacity:1}
.player.playing .pv-cover{display:none}
.pv-ctrl button{color:#fff;display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:8px}
.pv-ctrl button:hover{background:rgba(255,255,255,.18)}
.pv-seek{flex:1;height:7px;border-radius:5px;background:rgba(255,255,255,.25);position:relative;cursor:pointer}
.pv-seek i{position:absolute;left:0;top:0;bottom:0;border-radius:5px;background:var(--accent2);width:0}
.pv-time{color:#fff;font-size:.78rem;font-variant-numeric:tabular-nums;min-width:84px;text-align:right}
.vnav{display:flex;align-items:center;justify-content:space-between;margin-top:14px;gap:10px}
.vnav .dots{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
.vnav .dot{width:11px;height:11px;border-radius:50%;background:var(--brd2);transition:.16s}
.vnav .dot.on{background:var(--brand);transform:scale(1.25)}
.vnav .dot.seen{background:var(--brand2)}
.nbtn{display:inline-flex;align-items:center;gap:7px;background:var(--brand);color:#fff;padding:10px 16px;border-radius:11px;font-family:var(--head);font-weight:600;font-size:.92rem;transition:.16s;min-height:46px}
.nbtn:hover{background:var(--brand2)}
.nbtn:disabled{opacity:.4;cursor:not-allowed}
.nbtn.ghost{background:var(--card);color:var(--brand);border:1.5px solid var(--brd2)}
.nbtn.ghost:hover{background:var(--brandL)}
.nbtn.gold{background:var(--gold)}.nbtn.gold:hover{background:var(--gold2)}

.qcount{font-size:.82rem;color:var(--brand2);font-weight:700;font-family:var(--head);text-transform:uppercase;letter-spacing:.05em}
.qkey{font-size:1.4rem;color:var(--brandD);margin:6px 0 14px;line-height:1.3}
.ans{background:var(--card);border:1px solid var(--brd);border-left:4px solid var(--brand);border-radius:12px;padding:18px 20px;box-shadow:var(--shadow);font-size:1.05rem}
.ans .lbl{font-family:var(--head);font-weight:700;font-size:.74rem;letter-spacing:.06em;text-transform:uppercase;color:var(--brand2);margin-bottom:7px;display:flex;align-items:center;gap:7px}
.gloss{margin-top:16px;background:var(--card2);border:1px solid var(--brd);border-radius:12px;padding:16px 18px}
.gloss .lbl{font-family:var(--head);font-weight:700;font-size:.74rem;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.gloss dl{display:flex;flex-direction:column;gap:9px}
.gloss dt{font-weight:700;color:var(--brandD);font-family:var(--head);font-size:.98rem}
.gloss dd{color:var(--muted);font-size:.95rem;margin-left:0}
.secCTA{margin-top:24px;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.ctaHint{font-size:.84rem;color:var(--muted);max-width:420px;text-align:right}

/* ===== Quiz ===== */
.qbox{max-width:760px;margin:0 auto}
.qprog{height:9px;border-radius:6px;background:var(--brd);overflow:hidden;margin-bottom:6px}
.qprog i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),var(--brand2));width:0;transition:.4s}
.qmeta{font-size:.84rem;color:var(--muted);margin-bottom:18px;text-align:right}
.qcard{background:var(--card);border:1px solid var(--brd);border-radius:16px;padding:26px;box-shadow:var(--shadow)}
.qtype{display:inline-block;font-family:var(--head);font-size:.72rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--brand2);background:var(--brandL);padding:4px 10px;border-radius:20px;margin-bottom:12px}
.qtext{font-size:1.25rem;color:var(--brandD);margin-bottom:18px;line-height:1.35}
.opts{display:flex;flex-direction:column;gap:11px}
.opt{display:flex;align-items:center;gap:13px;padding:14px 16px;border:1.5px solid var(--brd2);border-radius:12px;background:var(--card2);transition:.14s;font-size:1.02rem;text-align:left;min-height:54px}
.opt:hover:not(.locked){border-color:var(--brand2);background:var(--brandL)}
.opt .mk{flex:0 0 26px;height:26px;border-radius:7px;border:2px solid var(--brd2);display:flex;align-items:center;justify-content:center;color:#fff;transition:.14s}
.opt.round .mk{border-radius:50%}
.opt.sel{border-color:var(--brand);background:var(--brandL)}
.opt.sel .mk{background:var(--brand);border-color:var(--brand)}
.opt.correct{border-color:var(--ok);background:var(--okL)}
.opt.correct .mk{background:var(--ok);border-color:var(--ok)}
.opt.wrong{border-color:var(--warn);background:var(--warnL)}
.opt.wrong .mk{background:var(--warn);border-color:var(--warn)}
.opt.locked{cursor:default}
.fillsel{font-family:var(--body);font-size:1.05rem;padding:10px 14px;border:2px solid var(--brand2);border-radius:10px;background:var(--card);color:var(--brandD);min-height:48px;min-width:200px}
.fb{margin-top:16px;padding:14px 16px;border-radius:11px;font-size:.98rem;display:none}
.fb.show{display:block;animation:fade .25s}
.fb.good{background:var(--okL);border:1px solid var(--ok);color:#0a5e44}
.fb.soft{background:var(--warnL);border:1px solid var(--warn);color:#7a5a07}
.fb b{font-family:var(--head)}
.qfoot{margin-top:22px;display:flex;justify-content:space-between;align-items:center;gap:12px}
textarea.studentbox{width:100%;min-height:130px;font-family:var(--body);font-size:18px;padding:14px 16px;border:2px solid var(--brd2);border-radius:12px;resize:vertical;background:var(--card)}
textarea.studentbox:focus{outline:none;border-color:var(--brand)}
.boxhint{font-size:.84rem;color:var(--muted);margin-top:7px}
.official{margin-top:16px;background:var(--accentL);border:1px solid var(--accent);border-radius:12px;padding:16px 18px;display:none}
.official.show{display:block;animation:fade .25s}
.official .lbl{font-family:var(--head);font-weight:700;font-size:.74rem;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);margin-bottom:7px;display:flex;align-items:center;gap:7px}

/* result */
.result{text-align:center;max-width:560px;margin:10px auto}
.ring{--p:0;width:170px;height:170px;border-radius:50%;margin:14px auto;display:flex;align-items:center;justify-content:center;
  background:conic-gradient(var(--brand) calc(var(--p)*1%),var(--brd) 0)}
.ring .in{width:134px;height:134px;border-radius:50%;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .pc{font-family:var(--head);font-size:2.2rem;font-weight:700;color:var(--brandD)}
.ring .sub{font-size:.82rem;color:var(--muted)}
.medal{font-family:var(--head);font-weight:700;font-size:1.3rem;color:var(--gold);margin:8px 0}
.retlist{margin:18px auto;max-width:620px;text-align:left}
.retitem{background:var(--card);border:1px solid var(--brd);border-left:4px solid var(--warn);border-radius:12px;padding:14px 16px;margin-bottom:12px}
.retitem .q{font-weight:700;color:var(--brandD);font-family:var(--head);margin-bottom:6px}
.retitem .of{font-size:.94rem;color:var(--muted);margin:6px 0 10px}
.center{text-align:center;margin-top:18px}

@media(max-width:980px){
  .shell{grid-template-columns:1fr}
  .sidebar{position:static;height:auto;flex-direction:column}
  .navlist{display:flex;flex-wrap:wrap;gap:8px}
  .navbtn{width:auto;flex:1 1 auto;min-width:140px}
  .navbtn.final{margin-top:8px;width:100%}
  .gallery{grid-template-columns:1fr}
  .vcol{position:static}
  .main{padding:22px 18px 50px}
}
@media(max-width:560px){.phead h1{font-size:1.5rem}.qkey{font-size:1.2rem}}
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <span class="logo" aria-hidden="true">
        <svg width="40" height="40" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="#0E6E70"/><path d="M32 12l16 6v12c0 11-7 18-16 22-9-4-16-11-16-22V18z" fill="none" stroke="#E6F3F2" stroke-width="4" stroke-linejoin="round"/><path d="M24 32l6 6 12-13" fill="none" stroke="#1FA6B8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <span class="txt"><b>Cittadinanza Digitale</b><span>Concetti generali</span></span>
    </div>
    <div class="navlbl">Sezioni</div>
    <nav class="navlist" id="nav"></nav>
    <div class="progwrap">Sezioni completate: <span id="progtxt">0 / 6</span>
      <div class="progbar"><i id="progfill"></i></div>
    </div>
    <button class="navbtn final locked" id="finalBtn">
      <span class="ico" aria-hidden="true"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 0 1-10 0z"/><path d="M17 5h2a2 2 0 0 1 0 4h-1M7 5H5a2 2 0 0 0 0 4h1"/></svg></span>
      <span class="nm">Test Finale</span>
      <span class="stat" id="finalStat" aria-hidden="true"></span>

const DATA = {"appTitle":"Concetti Generali di Cittadinanza Digitale","appSubtitle":"Privacy, sicurezza e spirito critico in rete","sections":[{"title":"Privacy e Dati Personali","icon":"shield","videos":[{"answer":"La privacy è la libertà di decidere quali nostre informazioni rendere pubbliche e quali tenere per noi, per la famiglia, per gli amici o per gli insegnanti. Non riguarda i \"segreti\" o le cose da nascondere: è il diritto alla riservatezza. Oggi significa soprattutto autodeterminazione dei dati, cioè essere noi a decidere cosa accade ai nostri dati digitali. Per questo è sbagliato pensare \"non ho niente da nascondere, quindi posso pubblicare tutto\".","glossary":[{"t":"Privacy","d":"La libertà di scegliere quali dati condividere e quali tenere per sé."},{"t":"Riservatezza","d":"Tenere per sé le informazioni personali che non vogliamo diffondere."},{"t":"Autodeterminazione dei dati","d":"Decidere noi cosa succede ai nostri dati digitali."}],"q":"Che cos’è la privacy?","videoId":"490QAmZlvTY"},{"answer":"Sì. Anche se cancelliamo una foto, spesso non sparisce davvero, perché i servizi online dove l'abbiamo caricata ne conservano delle copie. Per questo conviene non pubblicare mai foto che potrebbero metterci in imbarazzo o danneggiare la nostra reputazione in futuro, ad esempio davanti a chi un giorno ci offrirà un lavoro. È inoltre molto importante non diffondere in rete le foto dei bambini, perché possono finire nelle mani di persone malintenzionate.","glossary":[{"t":"Permanenza dei dati","d":"Le informazioni online possono restare anche dopo che le abbiamo cancellate."},{"t":"Reputazione","d":"L'immagine di noi che si costruisce online e che gli altri possono vedere."},{"t":"Recruiter","d":"Chi seleziona le persone per un lavoro e può cercare le tue tracce online."}],"q":"È vero che le foto che pubblichiamo sul web rimarranno per sempre?","videoId":"oGss-VLYx80"},{"answer":"Sì, è rischioso. Internet è nata per essere trasparente, quindi senza protezioni le informazioni che viaggiano via e-mail possono essere rubate. L'e-mail è ormai la chiave di tutte le nostre attività, perché ci registriamo ai siti e riceviamo documenti importanti, perciò va protetta con grande cura. Non bisogna mai inviare documenti d'identità via e-mail o chat: chi li ruba può sostituirsi a noi con tecniche di ingegneria sociale, ad esempio per fare acquisti a nostro nome.","glossary":[{"t":"Documento d'identità","d":"Carta d'identità o passaporto: dati di grande valore da non condividere."},{"t":"Furto d'identità","d":"Quando qualcuno si finge te per truffare o agire al posto tuo."},{"t":"Ingegneria sociale","d":"Tecniche per ingannare le persone e farsi consegnare i loro dati."}],"q":"È pericoloso scambiarsi i documenti come il passaporto o la carta di identità via e-mail?","videoId":"VbmzYMLF_qM"},{"answer":"Un data breach è la violazione di una banca dati: qualcuno \"buca\" un grande server che contiene le credenziali e i dati di tante persone, come nome, e-mail, ma anche conto bancario o dati sulla salute. Chi compie il data breach ruba queste informazioni e a volte le mette in vendita o le diffonde, anche nel dark web. È successo davvero a grandi siti, con danni alla vita privata di migliaia di persone. Per questo proteggere i propri dati è fondamentale.","glossary":[{"t":"Data breach","d":"La violazione, cioè il furto, dei dati conservati in una banca dati."},{"t":"Banca dati","d":"Un grande server che conserva i dati di moltissime persone."},{"t":"Credenziali","d":"Il nome utente e la password per accedere a un servizio."}],"q":"Che cos’è il Data breach?","videoId":"OdfZhXKrB2M"}],"quiz":[{"type":"mc","q":"Che cos'è soprattutto la privacy oggi?","options":["Il diritto di nascondere i propri segreti","L'autodeterminazione dei nostri dati digitali","Un programma antivirus","Il divieto di usare internet"],"correct":1,"explain":"La privacy è la libertà di decidere cosa accade ai nostri dati: autodeterminazione, non segretezza."},{"type":"tf","q":"Una foto cancellata dal web sparisce sempre per sempre.","correct":false,"explain":"Anche se la cancelli, spesso i servizi online ne conservano delle copie."},{"type":"mc","q":"Perché non bisogna inviare la carta d'identità via e-mail?","options":["Perché occupa troppo spazio","Perché può essere rubata e usata per il furto d'identità","Perché l'e-mail è troppo lenta","Perché lo vieta la scuola"],"correct":1,"explain":"I documenti d'identità rubati permettono a un criminale di sostituirsi a noi."},{"type":"fill","q":"Un ___ è la violazione di una banca dati che contiene i dati di molte persone.","options":["data breach","cookie","backup"],"correct":0,"explain":"Il data breach è proprio il furto dei dati da un grande server."},{"type":"ms","q":"Quali di questi sono dati personali da proteggere? (più risposte)","options":["Nome ed e-mail","Numero del conto bancario","Il colore preferito di un cartone animato","Dati sulla salute"],"correct":[0,1,3],"explain":"Nome, e-mail, conto e dati sulla salute sono dati personali; il colore di un cartone no."}],"open":{"prompt":"Spiega con parole tue che cos'è la privacy e perché è sbagliato dire «non ho niente da nascondere».","keywords":["privacy","dati","scegliere","riservatezza","pubblici"],"official":"La privacy è la libertà di scegliere quali dati rendere pubblici e quali tenere per sé. Non riguarda i segreti ma la riservatezza e l'autodeterminazione dei propri dati: per questo dire «non ho niente da nascondere» è un errore, perché i nostri dati hanno valore e vanno protetti."}},{"title":"Sicurezza e Minacce Informatiche","icon":"bug","videos":[{"answer":"I software spia, chiamati spyware, sono programmi che, una volta installati su un dispositivo, controllano ciò che fa la persona che lo usa. Possono essere legali o illegali a seconda delle leggi del paese. Alcuni vengono usati in modo scorretto per spiare di nascosto altre persone; altri, come il controllo genitoriale, servono ai genitori per proteggere i figli.","glossary":[{"t":"Software spia (spyware)","d":"Programma che controlla di nascosto cosa fai sul dispositivo."},{"t":"Controllo genitoriale","d":"Uno spyware \"buono\" che i genitori usano per proteggere i figli."}],"q":"Cosa sono i software spia?","videoId":"1eqMKrJDLgY"},{"answer":"L'ingegneria sociale è l'insieme delle tecniche usate per conquistare la fiducia delle persone e farsi dare informazioni, che poi un truffatore può usare per rubare denaro o fingersi qualcun altro. Funziona accumulando piccoli pezzi di dati, come nome, cognome, e-mail, posto di lavoro e familiari, fino a costruire il profilo completo di una persona. Ogni piccola informazione può essere sfruttata, per questo è importante proteggere i propri dati. Le stesse tecniche le conosce anche la Polizia Postale, che le usa per il bene.","glossary":[{"t":"Ingegneria sociale","d":"Ingannare le persone conquistando la loro fiducia per ottenere informazioni."},{"t":"Profilo","d":"L'insieme dei dati che, messi insieme, descrivono una persona."},{"t":"Polizia Postale","d":"Le forze dell'ordine che combattono i reati informatici."}],"q":"Che cos’è l’Ingegneria sociale?","videoId":"TPgZ1AQBMmU"},{"answer":"È una truffa, chiamata anche BEC o truffa del CEO, in cui i criminali spiano per un po' la posta di un'azienda per capire con chi si scambia messaggi e cosa compra. Poi si fingono uno degli interlocutori abituali e offrono qualcosa a buon prezzo, fornendo un IBAN su cui versare denaro: la vittima paga, ma non riceve mai nulla. La polizia federale americana ha calcolato che in tre anni queste truffe hanno fruttato ai malfattori 26 miliardi di dollari.","glossary":[{"t":"Truffa del CEO (BEC)","d":"I criminali si fingono un capo o un fornitore per farsi pagare."},{"t":"IBAN","d":"Il codice del conto bancario su cui si versa il denaro."},{"t":"Interlocutore","d":"La persona con cui si comunica abitualmente."}],"q":"Che cos’è la truffa del Direttore generale?","videoId":"Pv0o_loND4k"},{"answer":"Una cyber war, cioè una guerra informatica, può iniziare senza che ce ne accorgiamo: una mattina la luce non si accende, il caffè elettrico non funziona, il telefono è scarico. Gli attacchi informatici di oggi puntano a interrompere corrente, telecomunicazioni e il funzionamento degli ospedali, per creare panico. Colpiscono le infrastrutture critiche, come trasporti, energia, scuole e ospedali, usando software dannosi, per sabotare le comunicazioni e rubare informazioni utili contro l'avversario.","glossary":[{"t":"Cyber war","d":"Una guerra combattuta con strumenti informatici invece che con le armi."},{"t":"Infrastrutture critiche","d":"I servizi essenziali: energia, trasporti, ospedali, scuole."},{"t":"Sabotaggio","d":"Danneggiare di nascosto il funzionamento di qualcosa."}],"q":"Qual è lo scenario dell’inizio di una cyber war?","videoId":"zNGuwSyA3ek"},{"answer":"La sicurezza informatica non protegge solo i dati, ma anche l'incolumità delle persone. Viviamo tra oggetti connessi a internet e comandati da software, come gli smart building e le case domotiche: se qualcuno interferisce con quel software, può bloccare la società intera. Un attacco può spegnere i semafori, fermare gli ascensori o bloccare le terapie di un ospedale, dove un software decide tempi e dosi dei farmaci. Per questo la cyber security riguarda anche la sicurezza dei nostri comportamenti di tutti i giorni.","glossary":[{"t":"Cyber security","d":"La sicurezza informatica, che protegge dati e persone."},{"t":"Casa domotica","d":"Una casa con oggetti connessi e controllati da software."},{"t":"Incolumità","d":"Il fatto di non subire danni alla propria persona."}],"q":"Cosa comportano gli attacchi informatici?","videoId":"iJDlctUv9us"},{"answer":"Un malware è un software malevolo che interferisce con il normale funzionamento del computer o del telefono. Può essere un ransomware, che blocca il dispositivo e chiede un riscatto per riavere i dati; un virus, che prende il controllo del computer e lo usa per gli scopi di un criminale; oppure uno spyware, che spia ciò che facciamo e invia le informazioni a qualcun altro.","glossary":[{"t":"Malware","d":"Un software dannoso costruito per danneggiare o spiare."},{"t":"Ransomware","d":"Un malware che blocca i dati e chiede un riscatto."},{"t":"Virus","d":"Un programma che prende il controllo del dispositivo."}],"q":"Che cos’è il Malware?","videoId":"XNDK_ftAK5o"}],"quiz":[{"type":"mc","q":"A cosa serve l'ingegneria sociale?","options":["A costruire ponti e strade","A conquistare la fiducia delle persone per farsi dare informazioni","A riparare il computer","A creare videogiochi"],"correct":1,"explain":"È l'arte di ingannare le persone, accumulando dati per costruirne il profilo."},{"type":"tf","q":"La sicurezza informatica riguarda solo i dati, non la salute delle persone.","correct":false,"explain":"Riguarda anche l'incolumità: un attacco a un ospedale può bloccare le terapie."},{"type":"fill","q":"Un malware che blocca i dati e chiede un riscatto si chiama ___.","options":["ransomware","antivirus","backup"],"correct":0,"explain":"Il ransomware prende in ostaggio i dati e chiede denaro per liberarli."},{"type":"ms","q":"Quali di questi sono infrastrutture critiche colpite da una cyber war? (più risposte)","options":["Ospedali","Rete elettrica","Un gioco da tavolo","Sistemi di trasporto"],"correct":[0,1,3],"explain":"Ospedali, energia e trasporti sono servizi essenziali; un gioco da tavolo no."},{"type":"mc","q":"Qual è un uso corretto di un software spia?","options":["Spiare di nascosto un amico","Il controllo genitoriale per proteggere i figli","Rubare le password","Bloccare un ospedale"],"correct":1,"explain":"Lo spyware del controllo genitoriale serve a proteggere i figli."}],"open":{"prompt":"Spiega che cos'è il malware e indica almeno due tipi diversi di malware.","keywords":["malware","software","virus","ransomware","riscatto"],"official":"Un malware è un software malevolo che interferisce con il funzionamento del computer o del telefono. Esempi sono il ransomware, che blocca i dati e chiede un riscatto, il virus, che prende il controllo del dispositivo, e lo spyware, che spia ciò che facciamo."}},{"title":"Autenticazione e Truffe via Mail","icon":"key","videos":[{"answer":"Esiste un sito creato da un esperto, Troy Hunt, che ha raccolto in un unico \"magazzino\" i data breach degli ultimi anni di servizi come Twitter, Facebook, Yahoo, Dropbox e Adobe. Inserendo la propria e-mail nel campo di ricerca, il sito dice se quell'e-mail è stata compromessa e in quale data breach. Se è stata violata, c'è una cosa da fare subito: cambiare la password.","glossary":[{"t":"Password compromessa","d":"Una password rubata durante un data breach."},{"t":"Have I Been Pwned","d":"Il sito-magazzino dei data breach creato da Troy Hunt."},{"t":"Cambiare la password","d":"La prima cosa da fare se scopri di essere stato violato."}],"q":"Come si fa per sapere se qualcuno ci ha rubato la password dei nostri social o delle nostre e-mail?","videoId":"MtO7r3U4gDQ"},{"answer":"Ogni giorno riceviamo decine di e-mail indesiderate, un tempo chiamate junk mail, cioè posta spazzatura, o spam. Bisogna fare molta attenzione, perché spesso nascondono truffe: ad esempio finte richieste di donare soldi in beneficenza per aiutare le vittime di una catastrofe.","glossary":[{"t":"Spam","d":"E-mail indesiderate inviate in grande quantità."},{"t":"Junk mail","d":"La posta spazzatura, spesso usata per truffe."},{"t":"Truffa benefica","d":"Una finta richiesta di donazioni per rubare soldi."}],"q":"Quali sono i tranelli che nasconde la posta elettronica?","videoId":"XBy29dPeGRQ"},{"answer":"Sì, è molto comune: è stato violato perfino il profilo Twitter di Mark Zuckerberg, che usava la stessa password facile per molti account. L'errore che fanno in tanti è scegliere password facili, come il nome del gatto o una data importante. Una buona password è difficile da indovinare: almeno otto caratteri, con maiuscole, minuscole, numeri e punteggiatura. E non bisogna mai usare la stessa e-mail e password per servizi diversi.","glossary":[{"t":"Password robusta","d":"Lunga e complessa, difficile da indovinare."},{"t":"Riuso della password","d":"Usare la stessa password ovunque: un errore pericoloso."},{"t":"Account","d":"Il profilo personale su un servizio online."}],"q":"È molto comune il furto della password?","videoId":"QICxie7_Cbw"},{"answer":"Il phishing è la \"pesca a strascico\" dei nostri dati: un inganno che cerca di farci fare qualcosa, come scaricare un allegato o cliccare un link. Quando lo facciamo, entra un virus che può prendere il controllo del computer; quel virus si chiama trojan horse, cavallo di Troia, perché si infila senza farsi riconoscere. Da quel momento il criminale può rubare contatti e allegati, o trasformare il computer in un \"computer zombie\" comandato a distanza. Lo spear phishing è la versione mirata, rivolta proprio a una persona scelta.","glossary":[{"t":"Phishing","d":"Inganno per rubare dati facendoci cliccare link o allegati."},{"t":"Trojan horse","d":"Un virus nascosto che prende il controllo del computer."},{"t":"Computer zombie","d":"Un computer infettato e comandato a distanza da un criminale."}],"q":"Che cos’è il phishing e come funziona?","videoId":"1iPRuIjPuKg"}],"quiz":[{"type":"mc","q":"Se scopri che la tua e-mail è stata compromessa in un data breach, cosa devi fare subito?","options":["Spegnere il computer per sempre","Cambiare la password","Cancellare tutte le foto","Comprare un nuovo telefono"],"correct":1,"explain":"La prima cosa da fare è cambiare immediatamente la password."},{"type":"tf","q":"Usare la stessa password per tutti i servizi è una buona idea perché è facile da ricordare.","correct":false,"explain":"Mai riusare la stessa password: se la rubano, entrano ovunque."},{"type":"ms","q":"Quali caratteristiche ha una buona password? (più risposte)","options":["Almeno otto caratteri","Maiuscole, minuscole e numeri","Il nome del proprio gatto","Difficile da indovinare"],"correct":[0,1,3],"explain":"Una buona password è lunga, mista e difficile; il nome del gatto è facile da indovinare."},{"type":"fill","q":"Il virus che si infila di nascosto nel computer durante un attacco di phishing si chiama ___.","options":["trojan horse","antivirus","cookie"],"correct":0,"explain":"Il trojan horse, cavallo di Troia, entra senza farsi riconoscere."},{"type":"mc","q":"Che cos'è lo spam?","options":["Un tipo di password","Le e-mail indesiderate inviate in massa","Un motore di ricerca","Un antivirus"],"correct":1,"explain":"Lo spam è la posta spazzatura, che spesso nasconde truffe."}],"open":{"prompt":"Spiega che cos'è il phishing e descrivi che cosa succede quando clicchiamo su un link o un allegato infetto.","keywords":["phishing","link","allegato","virus","controllo"],"official":"Il phishing è un inganno che cerca di farci cliccare un link o scaricare un allegato. Quando lo facciamo, entra un virus, spesso un trojan horse, che può prendere il controllo del computer e permettere al criminale di rubare i nostri dati o comandarlo a distanza."}},{"title":"Disinformazione, Fake News e IA","icon":"alert","videos":[{"answer":"Sì. Oggi esistono tecniche per creare finti giornalisti o attori artificiali. Sono diventate così economiche e facili che con una semplice app si può far dire a una persona famosa cose mai dette. Si parla di deep fake, cioè video profondamente falsi, e di fake audio, audio fasulli: l'intelligenza artificiale può imitare un discorso mai pronunciato e farlo sembrare vero. I danni possono essere enormi, ad esempio se si mette in bocca a un presidente una falsa dichiarazione di guerra.","glossary":[{"t":"Deep fake","d":"Un video falso creato con l'intelligenza artificiale."},{"t":"Fake audio","d":"Un audio falso che imita la voce di una persona vera."},{"t":"Intelligenza artificiale","d":"Sistemi capaci di imitare voci e volti delle persone."}],"q":"È vero che con l’intelligenza artificiale si possono falsificare le persone?","videoId":"uSh_Viltgfg"},{"answer":"La maggior parte delle persone non sa distinguerle, perché il 90% delle notizie false sono verosimili, cioè sembrano vere. Spesso però hanno titoli \"strillati\" come attenzione, finalmente, scoperto, compaiono su siti non affidabili e non portano prove, ma solo un \"si dice che...\". Il primo indicatore è un titolo troppo bello o troppo strano per essere vero. La regola è verificare: confrontare la notizia con fonti diverse e affidabili e chiedere a esperti o adulti di fiducia.","glossary":[{"t":"Fake news","d":"Una notizia falsa fatta circolare in rete."},{"t":"Verosimile","d":"Che sembra vero, anche se in realtà non lo è."},{"t":"Verifica delle fonti","d":"Controllare la notizia su fonti diverse e affidabili."}],"q":"Come si riconosce una notizia vera da una notizia falsa?","videoId":"1FFsDP8b6lo"},{"answer":"La rete è uno strumento straordinario, ma ospita di tutto: cose utili e tante sciocchezze. La difficoltà è imparare a distinguere le informazioni fondate dalle bufale. Le teorie del complotto attirano molta attenzione perché offrono risposte facili a problemi complessi e si accordano con i pregiudizi delle persone. Per questo serve imparare a navigare cercando fonti affidabili ed evitando quelle che diffondono falsità.","glossary":[{"t":"Bufala","d":"Una notizia falsa che circola in rete."},{"t":"Teoria del complotto","d":"Una spiegazione semplicistica e falsa di fatti complessi."},{"t":"Pregiudizio","d":"Un'idea già formata che ci porta a credere ciò che vogliamo."}],"q":"Perché le persone in rete credono alle fake news?","videoId":"U4UxW-UjVx4"},{"answer":"Il fact checking è la verifica delle fonti per capire quanto è credibile un'informazione che circola in rete. Da solo, però, non basta a sconfiggere le fake news. Non esiste un profilo di persona più \"credulona\": uomini o donne, ragazzi o adulti, tutti, nelle giuste condizioni, possiamo cadere nella trappola. Anzi, a volte chi è più convinto delle proprie idee rischia di più, perché cerca informazioni che confermano ciò che già pensa.","glossary":[{"t":"Fact checking","d":"La verifica delle fonti di una notizia."},{"t":"Credibilità","d":"Quanto un'informazione è affidabile e degna di fiducia."},{"t":"Conferma delle proprie idee","d":"La tendenza a credere solo a ciò che ci dà ragione."}],"q":"Cos’è il fact checking? Donne o uomini, ragazzi o adulti, chi è più attratto dalle notizie false?","videoId":"PgPCOyfDL50"},{"answer":"Il CICAP è il Comitato Italiano per il Controllo delle Affermazioni sulle Pseudoscienze, nato circa 30 anni fa per iniziativa di Piero Angela e di molti scienziati, come Margherita Hack, Rita Levi Montalcini e Umberto Eco. Verifica notizie al confine tra vero e falso. Il nostro cervello tende a scegliere le notizie più sensazionali e cade nel pregiudizio di conferma, cioè cerca ciò che conferma le proprie idee. Lo scopo del CICAP non è smontare ogni singola bufala, ma diffondere una mentalità critica, soprattutto nelle scuole, così che ognuno sappia difendersi da solo.","glossary":[{"t":"CICAP","d":"Il comitato italiano che verifica le pseudoscienze e le bufale."},{"t":"Pregiudizio di conferma","d":"Cercare solo ciò che conferma le nostre idee."},{"t":"Mentalità critica","d":"La capacità di valutare e verificare le informazioni."}],"q":"Parliamo di fake news: che cosa è il CICAP","videoId":"_LBwcKtkVOc"},{"answer":"Le notizie false vengono prodotte per attirare e affascinare le persone. Oggi il sistema dell'informazione non è più \"presidiato\": non c'è più qualcuno che controlla cosa è giusto pubblicare, e quasi tutti si sentono autorizzati a dire la propria su qualsiasi cosa. Sui social, inoltre, c'è tantissima informazione, ma il suo scopo non è informare: usiamo i social soprattutto per passare il tempo, non per cercare la verità.","glossary":[{"t":"Disinformazione","d":"La diffusione, spesso voluta, di notizie false."},{"t":"Sistema non presidiato","d":"Nessuno controlla più ciò che viene pubblicato in rete."},{"t":"Social network","d":"Piattaforme usate soprattutto per passare il tempo."}],"q":"Notizie false sui social e non solo, perché vengono create e messe in circolazione?","videoId":"iSbR2AXGPYQ"}],"quiz":[{"type":"tf","q":"Quasi tutte le notizie false sono verosimili, cioè sembrano vere.","correct":true,"explain":"Circa il 90% delle fake news sembra vero: per questo funzionano."},{"type":"mc","q":"Qual è il primo segnale di una notizia falsa?","options":["Un titolo troppo bello o troppo strano per essere vero","Un testo molto lungo","La presenza di immagini","Il fatto che sia scritta in italiano"],"correct":0,"explain":"Titoli strillati e troppo sensazionali sono il primo campanello d'allarme."},{"type":"mc","q":"Che cos'è il fact checking?","options":["Un videogioco","La verifica delle fonti di una notizia","Un tipo di virus","Un social network"],"correct":1,"explain":"Il fact checking serve a controllare quanto è credibile un'informazione."},{"type":"ms","q":"Come si verifica una notizia sospetta? (più risposte)","options":["Confrontandola con altre fonti affidabili","Chiedendo a un esperto o a un adulto di fiducia","Credendoci subito perché ha un bel titolo","Controllando se ne parlano i giornali seri"],"correct":[0,1,3],"explain":"Si verifica confrontando fonti diverse e affidabili, non fidandosi del titolo."},{"type":"fill","q":"Il comitato italiano che verifica bufale e pseudoscienze si chiama ___.","options":["CICAP","CEO","IBAN"],"correct":0,"explain":"Il CICAP, fondato da Piero Angela, diffonde la mentalità critica."}],"open":{"prompt":"Spiega come si riconosce una notizia falsa da una vera e che cosa bisogna fare per verificarla.","keywords":["falsa","titolo","fonti","verificare","verosimile"],"official":"Una notizia falsa è spesso verosimile, ha un titolo strillato e non porta prove. Per riconoscerla bisogna diffidare dei titoli troppo belli o strani e verificare l'informazione, confrontandola con fonti diverse e affidabili e chiedendo a esperti o adulti di fiducia."}},{"title":"Comportamento Online, Social e Minori","icon":"people","videos":[{"answer":"Il clicktivism, cioè l'\"attivismo del clic\", è un attivismo pigro: mettere un like senza preoccuparsi delle conseguenze. È pericoloso perché, attraverso i like, le piattaforme capiscono cosa ci piace e tendono a riproporcelo sempre. Così il nostro mondo online diventa più piccolo e perdiamo l'occasione di scoprire ciò che c'è oltre i nostri like. Per questo i like sono diventati anche uno strumento di manipolazione politica.","glossary":[{"t":"Clicktivism","d":"Un attivismo pigro fatto solo di like, senza vere conseguenze."},{"t":"Like","d":"Un segnale che dice alle piattaforme cosa ci piace."},{"t":"Manipolazione","d":"Influenzare le scelte delle persone usando i loro dati."}],"q":"Che cos’è il clicktivism? È pericoloso?","videoId":"Ajo-VzNwIvU"},{"answer":"Se usiamo senza permesso immagini scaricate dal web per un nostro video e lo pubblichiamo, potremmo ricevere la richiesta di un avvocato di rimuoverlo, o perfino la convocazione di un tribunale. Anche se una cosa è disponibile online, non possiamo usarla come ci pare: esistono i diritti d'autore. Un professore o un giornalista possono usarne alcune per spiegare o informare, ma se ci guadagniamo, ad esempio con la pubblicità sul nostro sito, stiamo togliendo all'autore ciò che gli spetta.","glossary":[{"t":"Diritto d'autore","d":"Chi crea un'opera decide come può essere usata."},{"t":"Copyright","d":"La protezione legale di foto, video e altre opere."},{"t":"Uso senza permesso","d":"Riutilizzare contenuti altrui: può essere illegale."}],"q":"Cosa succede se pubblico dei video realizzati con le immagini di altri?","videoId":"3SjLPwKctrg"},{"answer":"Tutto ciò che facciamo e diciamo sui social è scritto \"con la penna, non con la matita\": resta. Per questo, soprattutto pensando al futuro e al mondo del lavoro, è meglio non lasciare tracce discutibili, come foto imbarazzanti o comportamenti aggressivi. La popolarità in rete è gestita dagli algoritmi, che premiano chi tiene le persone più a lungo: per questo alcuni assumono comportamenti estremi. Ma non esiste alcun legame tra quanto sei popolare online e il tuo valore come persona.","glossary":[{"t":"Reputazione online","d":"L'immagine di noi che resta in rete e che gli altri vedono."},{"t":"Web reputation","d":"La gestione e cura della propria immagine digitale."},{"t":"Algoritmo","d":"La regola che decide cosa diventa popolare online."}],"q":"A cosa serve la reputazione online?","videoId":"8FM7z15-nTw"},{"answer":"I ragazzi passano sempre più tempo tra videogiochi, social e film online, e alcuni sviluppano una vera dipendenza: sono svogliati, non vogliono uscire, vedono meno gli amici. La regola che funziona è stare davanti allo schermo insieme a loro, capire ciò che vedono e dare significati e limiti: i dispositivi vanno usati solo in alcune ore, mai prima di dormire. Esistono i software di parental control per aiutare, ma è importante che non inviino quei dati a terze parti sconosciute.","glossary":[{"t":"Dipendenza da internet","d":"Un uso eccessivo che danneggia la vita di tutti i giorni."},{"t":"Parental control","d":"Software che aiuta i genitori a porre limiti d'uso."},{"t":"Limiti d'uso","d":"Orari e regole per un uso sano dei dispositivi."}],"q":"Come garantire ai propri figli un uso corretto della rete?","videoId":"mvhudJTKl6Y"},{"answer":"Di fronte al cyberbullismo si può iniziare ignorando chi aggredisce, ricordando che ognuno è diverso e che non dobbiamo vergognarci di ciò in cui crediamo. Se però la situazione ci fa stare male, dobbiamo chiedere aiuto: possiamo rivolgerci al Garante della Privacy, alla Polizia Postale o alle stesse piattaforme social dove avviene l'aggressione.","glossary":[{"t":"Cyberbullismo","d":"Aggressioni e offese ripetute compiute online."},{"t":"Garante della Privacy","d":"L'autorità che protegge i nostri dati e diritti."},{"t":"Polizia Postale","d":"A cui possiamo segnalare i reati che avvengono online."}],"q":"Cosa fare quando si è vittima di cyber bullismo?","videoId":"HTTlFf0f0pM"}],"quiz":[{"type":"tf","q":"Quello che pubblichiamo sui social è scritto «con la matita» e si può cancellare facilmente per sempre.","correct":false,"explain":"È scritto «con la penna»: resta e contribuisce alla nostra reputazione."},{"type":"mc","q":"Perché il clicktivism può essere pericoloso?","options":["Perché consuma la batteria","Perché con i like le piattaforme ci profilano e restringono ciò che vediamo","Perché rende il telefono lento","Perché costa molti soldi"],"correct":1,"explain":"I like dicono alle piattaforme cosa ci piace, riducendo ciò che ci mostrano."},{"type":"mc","q":"A chi possiamo rivolgerci se siamo vittime di cyberbullismo?","options":["A nessuno, va tenuto segreto","Al Garante della Privacy o alla Polizia Postale","Solo al bullo stesso","A un motore di ricerca"],"correct":1,"explain":"Si chiede aiuto al Garante della Privacy, alla Polizia Postale o alle piattaforme."},{"type":"fill","q":"Le regole che decidono cosa diventa popolare online si chiamano ___.","options":["algoritmi","cookie","password"],"correct":0,"explain":"Sono gli algoritmi a gestire la popolarità in rete."},{"type":"ms","q":"Cosa NON dovresti pubblicare per proteggere la tua reputazione? (più risposte)","options":["Foto imbarazzanti","Insulti e comportamenti aggressivi","Un disegno fatto da te per un progetto","Dati privati di altre persone"],"correct":[0,1,3],"explain":"Foto imbarazzanti, insulti e dati altrui danneggiano te e gli altri."}],"open":{"prompt":"Spiega che cos'è la reputazione online e perché è importante curarla fin da ragazzi.","keywords":["reputazione","social","tracce","resta","lavoro"],"official":"La reputazione online è l'immagine di noi che resta in rete: tutto ciò che pubblichiamo sui social è scritto «con la penna» e non sparisce. È importante curarla perché le tracce discutibili possono danneggiarci in futuro, ad esempio nel mondo del lavoro, anche se la popolarità online non corrisponde al nostro vero valore."}},{"title":"Servizi Online, Tracciamento e Web Nascosto","icon":"globe","videos":[{"answer":"Vale la pena chiedersi come fanno tanti servizi a essere gratuiti, visto che hanno dei costi, come la corrente, i programmatori e gli ingegneri. La risposta è che si pagano con la pubblicità e, più spesso, con i nostri dati personali: da dove ci colleghiamo, per quanto tempo, con chi parliamo, quali parole usiamo. Le piattaforme vendono questi dati ad aziende che fanno marketing mirato. Insomma: se il servizio è gratis, spesso il prodotto sei tu.","glossary":[{"t":"Servizio gratuito","d":"Gratis in denaro, ma pagato con i tuoi dati personali."},{"t":"Dati personali","d":"Le informazioni su di te, che hanno un grande valore."},{"t":"Marketing mirato","d":"Pubblicità costruita apposta sui tuoi dati."}],"q":"Online si trovano molti servizi gratuiti. Ma sono pericolosi?","videoId":"NnINq5AcGbQ"},{"answer":"Sì. Alcuni servizi leggono le nostre e-mail dicendo di farlo per offrirci un servizio migliore, ad esempio completare le frasi, ma è una violazione della privacy. Dicono che lo facciano solo delle intelligenze artificiali, però quelle IA sono state addestrate da persone che hanno letto enormi quantità di posta. Quasi tutti i servizi gratuiti che usiamo ogni giorno vendono i nostri dati ad aziende che fanno marketing.","glossary":[{"t":"Violazione della privacy","d":"L'uso dei tuoi dati senza un vero consenso."},{"t":"Addestramento dell'IA","d":"Insegnare all'IA usando enormi quantità di dati reali."},{"t":"Vendita dei dati","d":"Cedere ad altre aziende le informazioni sugli utenti."}],"q":"È vero che i servizi gratuiti ci spiano?","videoId":"n9IYG2wtGNQ"},{"answer":"La maggior parte di noi usa Google, che è stato spesso accusato di non garantire la privacy, perché tiene traccia di tutte le ricerche e navigazioni precedenti. Esistono però motori di ricerca più rispettosi: uno europeo si chiama Qwant, un altro è DuckDuckGo, il cui simbolo è un papero. Rispettano la nostra privacy più di tanti altri.","glossary":[{"t":"Motore di ricerca","d":"Un servizio per cercare informazioni in rete, come Google."},{"t":"Tracciamento","d":"Registrare le ricerche e le navigazioni degli utenti."},{"t":"DuckDuckGo / Qwant","d":"Motori di ricerca che rispettano di più la privacy."}],"q":"È vero che i motori di ricerca ci spiano?","videoId":"UUC9hMftr5g"},{"answer":"I cookies sono come le briciole di Pollicino: le tracce che lasciamo durante le nostre navigazioni. I siti li usano per sapere dove siamo stati e immaginare cosa ci può interessare. La legge europea impone che la presenza dei cookie sia segnalata e che possiamo scegliere se accettarli o no. Come le caramelle offerte da uno sconosciuto, non siamo obbligati ad accettarli.","glossary":[{"t":"Cookie","d":"Una piccola traccia che un sito salva sulle tue navigazioni."},{"t":"Tracciamento","d":"Seguire i tuoi spostamenti online tramite i cookie."},{"t":"Legge europea sui cookie","d":"Obbliga i siti a chiedere il consenso prima di usarli."}],"q":"Che cosa sono i cookies?","videoId":"hd_XhqlOkpk"},{"answer":"Sul web esistono profili falsi che fingono di voler avere un rapporto di amicizia con te, ma in realtà vogliono ingannarti per ricattarti o rubarti dei soldi. Si presentano come persone affascinanti e cercano di convincerti a fidarti e a inviare foto private; poi minacciano di diffonderle se non paghi, spesso in bitcoin. La regola è chiara: mai inviare foto private a sconosciuti e, se succede qualcosa del genere, parlarne subito con un adulto di fiducia.","glossary":[{"t":"Profilo falso","d":"Un'identità inventata e usata per ingannare le persone."},{"t":"Ricatto","d":"La minaccia di diffondere foto private per ottenere soldi."},{"t":"Bitcoin","d":"Una moneta digitale usata dai criminali perché difficile da tracciare."}],"q":"Cosa sono le esche sessuali?","videoId":"fjlJH4HHYOs"},{"answer":"Quando si usano app per conoscere persone, la regola è non dare mai troppe informazioni su di sé, come dove abiti, dove studi o a che ora esci, prima di aver costruito un vero rapporto di fiducia. È importante non condividere la geolocalizzazione e i dati sulla propria vita personale, perché potrebbero finire in mani sbagliate. Quando si incontra qualcuno conosciuto online, bisogna sempre avvisare una persona vicina di dove e quando si va; alcune app hanno perfino un pulsante SOS per chiedere aiuto.","glossary":[{"t":"Geolocalizzazione","d":"L'informazione su dove ti trovi in ogni momento."},{"t":"Relazione di fiducia","d":"Un legame costruito nel tempo prima di condividere dati."},{"t":"Pulsante SOS","d":"Una richiesta di aiuto immediata presente in alcune app."}],"q":"I siti di incontri sono pericolosi o no? Come frequentarli in sicurezza?","videoId":"r-dssog-3Ls"},{"answer":"L'igiene cibernetica è l'insieme degli accorgimenti per non \"ammalarsi\" usando telefono, tablet o computer: come ci laviamo le mani per evitare i germi, così teniamo i dispositivi al sicuro. Ci sono quattro regole: aggiornare il sistema operativo, che corregge le falle di sicurezza; usare un antivirus, che fa l'effetto degli antibiotici per il corpo; fare copie di backup dei dati importanti; avere una password lunga, robusta e complessa.","glossary":[{"t":"Igiene cibernetica","d":"Le buone abitudini per proteggere i propri dispositivi."},{"t":"Aggiornamento","d":"Corregge le falle di sicurezza del software."},{"t":"Backup","d":"Una copia di sicurezza dei dati importanti."}],"q":"Che cos’è l’igiene cibernetica?","videoId":"kBu2IL1xolM"},{"answer":"Immagina il web come un iceberg. La punta è il web di superficie: i siti che troviamo con i motori di ricerca, come quelli della scuola, dei social o del nostro cantante preferito. Sotto il pelo dell'acqua c'è il deep web, molto più grande, fatto di siti che non si trovano cercando parole chiave. Ancora più in profondità c'è il dark web, che si chiama così non perché sia più pericoloso, ma perché è più difficile da trovare. Lì vanno giornalisti che fanno inchieste o persone perseguitate, ma anche criminali che vendono cose illegali.","glossary":[{"t":"Web di superficie","d":"I siti che trovi normalmente con i motori di ricerca."},{"t":"Deep web","d":"I siti non raggiungibili dai motori di ricerca."},{"t":"Dark web","d":"La parte nascosta del web, difficile da trovare."}],"q":"Cosa sono il dark web e il deep web?","videoId":"83xMX6exCTM"}],"quiz":[{"type":"mc","q":"Come si pagano davvero i servizi online \"gratuiti\"?","options":["Con le monete del gioco","Con la pubblicità e con i nostri dati personali","Non hanno alcun costo","Con le tasse della scuola"],"correct":1,"explain":"Se il servizio è gratis, spesso il prodotto sei tu: paghi con i tuoi dati."},{"type":"tf","q":"I cookie sono tracce che lasciamo navigando e possiamo scegliere se accettarli.","correct":true,"explain":"Sono come le briciole di Pollicino; la legge europea ci fa scegliere se accettarli."},{"type":"mc","q":"Quale di questi è un motore di ricerca più rispettoso della privacy?","options":["Google","DuckDuckGo","YouPorn","Facebook"],"correct":1,"explain":"DuckDuckGo e Qwant rispettano la privacy più di altri."},{"type":"ms","q":"Quali sono le quattro regole dell'igiene cibernetica? (più risposte)","options":["Aggiornare il sistema operativo","Usare un antivirus","Pubblicare molte foto","Fare il backup e usare una password robusta"],"correct":[0,1,3],"explain":"Aggiornamenti, antivirus, backup e password robusta; pubblicare foto non c'entra."},{"type":"fill","q":"La parte nascosta e difficile da trovare del web si chiama ___.","options":["dark web","web di superficie","motore di ricerca"],"correct":0,"explain":"Il dark web è la parte più profonda e difficile da raggiungere."}],"open":{"prompt":"Spiega quali sono le quattro regole dell'igiene cibernetica per tenere al sicuro i tuoi dispositivi.","keywords":["aggiornare","antivirus","backup","password"],"official":"L'igiene cibernetica ha quattro regole: aggiornare il sistema operativo per correggere le falle di sicurezza, usare un antivirus, fare il backup dei dati importanti e avere una password lunga, robusta e complessa."}}],"final":[{"q":"Che cos'è un data breach e perché è pericoloso?","keywords":["violazione","dati","banca dati","rubare","server"],"official":"Un data breach è la violazione di una banca dati, cioè quando qualcuno buca un grande server e ruba i dati di tante persone, come nome, e-mail, conto bancario o dati sulla salute. È pericoloso perché quei dati possono essere venduti o diffusi e usati contro di noi.","ref":[0,3]},{"q":"Spiega che cos'è l'ingegneria sociale e come funziona.","keywords":["fiducia","informazioni","dati","profilo","truffatore"],"official":"L'ingegneria sociale è l'insieme delle tecniche usate per conquistare la fiducia delle persone e farsi dare informazioni. Funziona accumulando piccoli pezzi di dati fino a costruire il profilo completo di una persona, che il truffatore può poi usare per rubare denaro o fingersi qualcun altro.","ref":[1,1]},{"q":"Che cos'è il phishing? Descrivi come funziona.","keywords":["link","allegato","virus","controllo","dati"],"official":"Il phishing è un inganno che cerca di farci cliccare un link o scaricare un allegato infetto. Quando lo facciamo, entra un virus, spesso un trojan horse, che può prendere il controllo del computer e permettere al criminale di rubare i nostri dati o comandarlo a distanza.","ref":[2,3]},{"q":"Come si riconosce una notizia falsa da una vera?","keywords":["verosimile","titolo","fonti","verificare","prove"],"official":"Una notizia falsa è spesso verosimile, ha un titolo strillato e non porta prove. Per riconoscerla bisogna diffidare dei titoli troppo belli o strani e verificarla confrontandola con fonti diverse e affidabili.","ref":[3,1]},{"q":"Che cos'è la reputazione online e perché va curata?","keywords":["social","tracce","resta","lavoro","immagine"],"official":"La reputazione online è l'immagine di noi che resta in rete: tutto ciò che pubblichiamo è scritto «con la penna» e non sparisce. Va curata perché le tracce discutibili possono danneggiarci in futuro, ad esempio nel mondo del lavoro.","ref":[4,2]},{"q":"Quali sono le quattro regole dell'igiene cibernetica?","keywords":["aggiornare","antivirus","backup","password"],"official":"Le quattro regole dell'igiene cibernetica sono: aggiornare il sistema operativo, usare un antivirus, fare il backup dei dati importanti e avere una password lunga, robusta e complessa.","ref":[5,6]}]};

let YTReady=false, players=[];

function destroyPlayers(){players.forEach(p=>{try{p.yt&&p.yt.destroy()}catch(e){}});players=[];}
function fmt(t){t=Math.max(0,Math.floor(t||0));const m=Math.floor(t/60),s=t%60;return m+':'+String(s).padStart(2,'0');}

function mountPlayer(){
  const host=document.getElementById('ytmount');
  if(!host||!YTReady) return;
  const vidId=host.dataset.vid;
  const wrap=host.closest('.player');
  const seek=wrap.querySelector('.pv-seek i');
  const tEl=wrap.querySelector('.pv-time');
  const playIco=wrap.querySelector('.pv-play');
  const cover=wrap.querySelector('.pv-cover');
  const obj={yt:null,timer:null};
  obj.yt=new YT.Player(host,{
    videoId:vidId,
    playerVars:{controls:0,fs:0,modestbranding:1,rel:0,iv_load_policy:3,disablekb:1,playsinline:1,enablejsapi:1},
    events:{
      onReady:()=>{ tEl.textContent='0:00 / '+fmt(obj.yt.getDuration()); },
      onStateChange:(e)=>{
        if(e.data===YT.PlayerState.PLAYING){
          wrap.classList.add('playing'); playIco.innerHTML=ICONS.pause;
          clearInterval(obj.timer);
          obj.timer=setInterval(()=>{
            const d=obj.yt.getDuration()||0,c=obj.yt.getCurrentTime()||0;
            seek.style.width=(d?c/d*100:0)+'%';
            tEl.textContent=fmt(c)+' / '+fmt(d);
          },250);
        }else{
          playIco.innerHTML=ICONS.play;
          if(e.data===YT.PlayerState.ENDED){wrap.classList.remove('playing');seek.style.width='100%';}
          clearInterval(obj.timer);
        }
      }
    }
  });
  // overlay click = play/pausa
  const toggle=()=>{const st=obj.yt.getPlayerState();(st===YT.PlayerState.PLAYING)?obj.yt.pauseVideo():obj.yt.playVideo();};
  wrap.querySelector('.pv-over').onclick=toggle;
  cover.onclick=()=>{obj.yt.playVideo();};
  playIco.parentElement.onclick=(ev)=>{ev.stopPropagation();toggle();};
  const sb=wrap.querySelector('.pv-seek');
  sb.onclick=(ev)=>{const r=sb.getBoundingClientRect();const f=(ev.clientX-r.left)/r.width;obj.yt.seekTo(f*(obj.yt.getDuration()||0),true);};
  wrap.querySelector('.pv-mute').onclick=(ev)=>{ev.stopPropagation();const b=ev.currentTarget;if(obj.yt.isMuted()){obj.yt.unMute();b.innerHTML=ICONS.vol;}else{obj.yt.mute();b.innerHTML=ICONS.mute;}};
  players.push(obj);
}

function boldKeywords(text,terms){
  let out=text;
  terms.slice().sort((a,b)=>b.length-a.length).forEach(term=>{
    const esc=term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    try{
      const re=new RegExp('(?<![\\p{L}>])('+esc+')(?![\\p{L}<])','giu');
      out=out.replace(re,'<strong class="kw">$1</strong>');
    }catch(e){}
  });
  return out;
}

/* ---------- validazione testo studente (cfr. logica italiano) ---------- */
function normalize(t){return (t||'').toLowerCase().replace(/[àâ]/g,'a').replace(/[èéê]/g,'e').replace(/[ìî]/g,'i').replace(/[òô]/g,'o').replace(/[ùû]/g,'u');}
function looksNonsense(txt){
  const words=txt.trim().split(/\s+/).filter(w=>w.length>0);
  if(!words.length) return false;
  const vowels='aeiou';
  for(const w of words){
    const low=normalize(w).replace(/[^a-z]/g,'');
    if(low.length<3) continue;
    let consec=0;
    for(const c of low){ if(!vowels.includes(c)){consec++;}else{consec=0;} if(consec>=4) return true; }
  }
  return false;
}
function gradeOpen(txt,keywords){
  const t=normalize(txt);
  const words=txt.trim().split(/\s+/).filter(Boolean);
  if(words.length<8) return {ok:false,reason:'short',hit:[]};
  if(looksNonsense(txt)) return {ok:false,reason:'nonsense',hit:[]};
  const hit=keywords.filter(k=>{const ks=normalize(k);return ks.split(/\s+/).every(part=>t.includes(part.slice(0,Math.max(4,part.length-1))));});
  const need=Math.ceil(keywords.length/2);
  return {ok:hit.length>=need,reason:hit.length>=need?'ok':'few',hit,need};
}

/* ---------- QUIZ di sezione ---------- */
function openQuiz(si){
  destroyPlayers();
  state.view='quiz'; state.sec=si;
  const s=DATA.sections[si];
  const Q=[...s.quiz, {type:'open',q:s.open.prompt,keywords:s.open.keywords,official:s.open.official}];
  let idx=0, score=0, answered=false, sel=[];
  renderNav();

  function render(){
    answered=false; sel=[];
    const q=Q[idx];
    const total=Q.length;
    main.innerHTML=`
      <div class="qbox">
        <div class="phead"><span class="kick">Verifica · ${s.title}</span></div>
        <div class="qprog"><i style="width:${idx/total*100}%"></i></div>
        <div class="qmeta">Domanda ${idx+1} di ${total}</div>
        <div class="qcard" id="qcard"></div>
      </div>`;
    const card=document.getElementById('qcard');
    if(q.type==='open') renderOpen(card,q,total);
    else renderClosed(card,q,total);
  }

  function typeLabel(t){return {mc:'Scelta multipla',tf:'Vero o Falso',ms:'Scelta multipla (più risposte)',fill:'Completa la frase',open:'Domanda aperta'}[t]||t;}

  function renderClosed(card,q,total){
    let html=`<span class="qtype">${typeLabel(q.type)}</span><div class="qtext">${q.q}</div>`;
    if(q.type==='fill'){
      html+=`<div class="opts"><select class="fillsel" id="fillsel"><option value="">— scegli —</option>${q.options.map((o,i)=>`<option value="${i}">${o}</option>`).join('')}</select></div>`;
    }else{
      const opts = q.type==='tf' ? ['Vero','Falso'] : q.options;
      const round = q.type==='mc'||q.type==='tf';
      html+=`<div class="opts">${opts.map((o,i)=>`<button class="opt ${round?'round':''}" data-i="${i}"><span class="mk"></span><span>${o}</span></button>`).join('')}</div>`;
    }
    html+=`<div class="fb" id="fb"></div>
      <div class="qfoot"><span></span><button class="nbtn" id="qsub">Verifica</button></div>`;
    card.innerHTML=html;
    const fb=document.getElementById('fb');
    const isMulti=q.type==='ms';
    if(q.type==='fill'){
      // handled at submit
    }else{
      card.querySelectorAll('.opt').forEach(o=>o.onclick=()=>{
        if(answered) return;
        const i=+o.dataset.i;
        if(isMulti){ o.classList.toggle('sel'); sel=[...card.querySelectorAll('.opt.sel')].map(x=>+x.dataset.i); }
        else { card.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel')); o.classList.add('sel'); sel=[i]; }
      });
    }
    document.getElementById('qsub').onclick=()=>{
      if(answered){ next(); return; }
      let chosen, correct;
      if(q.type==='fill'){
        const v=document.getElementById('fillsel').value;
        if(v===''){fb.className='fb show soft';fb.innerHTML='Scegli un’opzione dal menu.';return;}
        chosen=[+v]; correct=[q.correct];
        document.getElementById('fillsel').disabled=true;
      }else if(q.type==='tf'){
        if(!sel.length){fb.className='fb show soft';fb.innerHTML='Scegli Vero o Falso.';return;}
        chosen=sel; correct=[q.correct?0:1];
      }else if(q.type==='ms'){
        if(!sel.length){fb.className='fb show soft';fb.innerHTML='Seleziona almeno una risposta.';return;}
        chosen=sel.slice().sort(); correct=q.correct.slice().sort();
      }else{
        if(!sel.length){fb.className='fb show soft';fb.innerHTML='Scegli una risposta.';return;}
        chosen=sel; correct=[q.correct];
      }
      answered=true;
      const ok=chosen.length===correct.length&&chosen.every(c=>correct.includes(c));
      if(ok) score++;
      // mark
      if(q.type!=='fill'){
        card.querySelectorAll('.opt').forEach(o=>{
          const i=+o.dataset.i; o.classList.add('locked');
          if(correct.includes(i)){o.classList.add('correct');o.querySelector('.mk').innerHTML=ICONS.check;}
          else if(chosen.includes(i)){o.classList.add('wrong');o.querySelector('.mk').innerHTML=ICONS.cross;}
        });
      }
      fb.className='fb show '+(ok?'good':'soft');
      fb.innerHTML=`<b>${ok?'Esatto!':'Da rivedere.'}</b> ${q.explain||''}`;
      document.getElementById('qsub').textContent = idx<total-1?'Avanti':'Vedi risultato';
    };
  }

  function renderOpen(card,q,total){
    card.innerHTML=`<span class="qtype">${typeLabel('open')}</span><div class="qtext">${q.q}</div>
      <textarea class="studentbox" id="sbox" placeholder="Scrivi qui la tua risposta con parole tue..."></textarea>
      <div class="boxhint">Scrivi almeno qualche frase completa. La risposta viene confrontata con le parole chiave dell'argomento.</div>
      <div class="fb" id="fb"></div>
      <div class="official" id="off"><div class="lbl">${ICONS.book} Risposta ufficiale da confrontare</div>${q.official}</div>
      <div class="qfoot"><span></span><button class="nbtn" id="qsub">Controlla la risposta</button></div>`;
    const fb=document.getElementById('fb'), off=document.getElementById('off');
    document.getElementById('qsub').onclick=()=>{
      if(answered){ next(); return; }
      const txt=document.getElementById('sbox').value;
      const r=gradeOpen(txt,q.keywords);
      if(r.reason==='short'){fb.className='fb show soft';fb.innerHTML='<b>Troppo breve.</b> Prova a spiegare con almeno qualche frase completa.';return;}
      if(r.reason==='nonsense'){fb.className='fb show soft';fb.innerHTML='<b>Attenzione.</b> Il testo non sembra avere senso compiuto: riscrivi con parole vere.';return;}
      answered=true;
      if(r.ok){score++; fb.className='fb show good'; fb.innerHTML=`<b>Ottimo!</b> Hai usato i concetti chiave (${r.hit.length} su ${q.keywords.length}). Confronta ora la tua risposta con quella ufficiale.`;}
      else { fb.className='fb show soft'; fb.innerHTML=`<b>Quasi.</b> Mancano alcuni concetti chiave (trovati ${r.hit.length} su ${q.keywords.length}). Leggi la risposta ufficiale e prova a capire cosa aggiungere.`;}
      off.classList.add('show');
      document.getElementById('sbox').readOnly=true;
      document.getElementById('qsub').textContent='Vedi risultato';
    };
  }

  function next(){ if(idx<Q.length-1){idx++;render();window.scrollTo({top:0,behavior:'smooth'});} else result(); }

  function result(){
    state.done[state.sec]=true;
    const total=Q.length, pc=Math.round(score/total*100);
    let medal = pc>=90?'Eccellente':pc>=70?'Molto bene':pc>=50?'Sufficiente':'Da rivedere';
    const nextSec=state.sec<DATA.sections.length-1?state.sec+1:null;
    const allDone=state.done.filter(Boolean).length===DATA.sections.length;
    main.innerHTML=`
      <div class="result">
        <div class="phead" style="text-align:center"><span class="kick">Verifica completata</span><h2>${s.title}</h2></div>
        <div class="ring" style="--p:${pc}"><div class="in"><span class="pc">${pc}%</span><span class="sub">${score} / ${total}</span></div></div>
        <div class="medal">${medal}</div>
        <p style="color:var(--muted)">Hai completato la verifica di questa sezione.${allDone?' <b>Hai finito tutte le sezioni: il Test Finale è sbloccato!</b>':''}</p>
        <div class="center" style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
          <button class="nbtn ghost" id="rev">${ICONS.back} Rivedi i video</button>
          ${allDone?`<button class="nbtn gold" id="goFinal">${ICONS.edit} Vai al Test Finale</button>`
            :(nextSec!==null?`<button class="nbtn" id="goNext">Sezione successiva ${ICONS.next}</button>`:'')}
        </div>
      </div>`;
    document.getElementById('rev').onclick=()=>openSection(state.sec,0);
    const gn=document.getElementById('goNext'); if(gn) gn.onclick=()=>openSection(nextSec,0);
    const gf=document.getElementById('goFinal'); if(gf) gf.onclick=()=>openFinal();
    renderNav();
    window.scrollTo({top:0,behavior:'smooth'});
  }
  render();
}

function openFinal(){
  destroyPlayers();
  state.view='final'; renderNav();
  const Q=DATA.final;
  let idx=0, correctCount=0, answered=false; const wrong=[];

  function render(){
    answered=false;

    main.innerHTML=`

        <div class="qmeta">Domanda ${idx+1} di ${total}</div>
        <div class="qcard" id="qcard"></div>
      </div>`;
    const card=document.getElementById('qcard');
    card.innerHTML=`<span class="qtype">Domanda aperta</span><div class="qtext">${q.q}</div>
      <textarea class="studentbox" id="sbox" placeholder="Scrivi qui la tua risposta..."></textarea>

    const fb=document.getElementById('fb'), off=document.getElementById('off'), foot=document.getElementById('foot');
    document.getElementById('qsub').onclick=()=>{
      if(answered){ next(); return; }
      const txt=document.getElementById('sbox').value;
      const r=gradeOpen(txt,q.keywords);
      if(r.reason==='short'){fb.className='fb show soft';fb.innerHTML='<b>Troppo breve.</b> Spiega con almeno qualche frase.';return;}
      if(r.reason==='nonsense'){fb.className='fb show soft';fb.innerHTML='<b>Attenzione.</b> Il testo non sembra avere senso: riscrivi con parole vere.';return;}
      answered=true;
      off.classList.add('show');

      }else{
        wrong.push(idx);
        fb.className='fb show soft'; fb.innerHTML=`<b>Risposta da rivedere.</b> Mancano dei concetti chiave (trovati ${r.hit.length} su ${q.keywords.length}). Torna al video e riprova.`;
        const [si,vi]=q.ref;
        const ret=document.createElement('button'); ret.className='nbtn ghost'; ret.innerHTML=`${ICONS.back} Torna al video`;
        ret.onclick=()=>{ openSection(si,vi); };
        foot.innerHTML=''; foot.appendChild(ret);
        const cont=document.createElement('button'); cont.className='nbtn'; cont.textContent= idx<total-1?'Avanti comunque':'Vedi esito finale';
        cont.onclick=()=>next(); foot.appendChild(cont);
      }
    };
  }
  function next(){ if(idx<Q.length-1){idx++;render();window.scrollTo({top:0,behavior:'smooth'});} else result(); }
  function result(){
    const total=Q.length, pc=Math.round(correctCount/total*100);
    let medal = pc>=90?'Cittadino digitale esperto':pc>=70?'Ottimo lavoro':pc>=50?'Sei sulla buona strada':'Riprova dopo aver rivisto i video';
    let retHtml='';
    if(wrong.length){
      retHtml='<div class="retlist"><h3 style="color:var(--brandD);margin-bottom:12px">Argomenti da rivedere</h3>'+
        wrong.map(i=>{const q=Q[i];const[si,vi]=q.ref;return `<div class="retitem"><div class="q">${q.q}</div><div class="of">${q.official}</div><button class="nbtn ghost" data-si="${si}" data-vi="${vi}">${ICONS.back} Torna al video</button></div>`;}).join('')+'</div>';
    }
    main.innerHTML=`
      <div class="result">
        <div class="phead" style="text-align:center"><span class="kick">Test Finale completato</span></div>
        <div class="ring" style="--p:${pc}"><div class="in"><span class="pc">${pc}%</span><span class="sub">${correctCount} / ${total}</span></div></div>
        <div class="medal">${medal}</div>
        ${wrong.length?'<p style="color:var(--muted)">Hai ancora qualche argomento da consolidare. Rivedi i video qui sotto e ripeti il test quando vuoi.</p>':'<p style="color:var(--muted)">Hai risposto correttamente a tutte le domande. Complimenti!</p>'}
      </div>
      ${retHtml}
      <div class="center" style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <button class="nbtn ghost" id="home2">Torna alla home</button>
        <button class="nbtn gold" id="again">Ripeti il test</button>
      </div>`;
    main.querySelectorAll('.retitem button').forEach(b=>b.onclick=()=>openSection(+b.dataset.si,+b.dataset.vi));
    document.getElementById('home2').onclick=openHome;
    document.getElementById('again').onclick=openFinal;
    window.scrollTo({top:0,behavior:'smooth'});
  }
  render();
}

/* ---------- avvio ---------- */
openHome();
</script>
</body>
</html>
